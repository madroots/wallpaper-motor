name: Build AppImage

on:
  push:
    branches: [master]
  release:
    types: [created]

jobs:
  build:
    name: Build Wallpaper Motor AppImage
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout (using v6 to avoid deprecated Node.js versions)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # 2. System build dependencies
      # -----------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            wget curl git \
            fuse libfuse2 \
            squashfs-tools \
            patchelf \
            desktop-file-utils \
            libx11-dev libxext-dev \
            libglib2.0-dev \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinput0 \
            libxkbcommon-x11-0 libegl1 libgl1-mesa-dev \
            libdbus-1-3 libglib2.0-0

      # -----------------------------------------------------------------------
      # 3. Build xwinwrap from source
      # -----------------------------------------------------------------------
      - name: Build xwinwrap from source
        run: |
          git clone --depth=1 https://github.com/ujjwal96/xwinwrap.git xwinwrap-src
          cd xwinwrap-src
          make
          file xwinwrap
          echo "xwinwrap built OK"

      # -----------------------------------------------------------------------
      # 4. Fetch latest Python 3.11 AppImage
      # -----------------------------------------------------------------------
      - name: Fetch latest Python 3.11 AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/niess/python-appimage/releases/tags/python3.11" \
            -o python311_release.json

          echo "=== API response preview ==="
          head -c 200 python311_release.json || true
          echo ""

          PYTHON_URL=$(python3 - << 'PYEOF'
          import json, sys
          data = json.load(open("python311_release.json"))
          assets = data.get("assets", [])
          hits = [
              a["browser_download_url"] for a in assets
              if "manylinux2014_x86_64" in a["name"] and a["name"].endswith(".AppImage")
          ]
          if not hits:
              sys.exit("ERROR: no manylinux2014_x86_64 AppImage found.")
          print(hits[0])
          PYEOF
          )

          echo "Downloading: ${PYTHON_URL}"
          wget -q "${PYTHON_URL}" -O python3-base.AppImage
          chmod +x python3-base.AppImage

      # -----------------------------------------------------------------------
      # 5. Extract Python AppImage and clean up metadata
      # -----------------------------------------------------------------------
      - name: Extract Python AppImage and clean metadata
        run: |
          ./python3-base.AppImage --appimage-extract
          mv squashfs-root AppDir

          # Strip Python's own desktop entry, AppRun, root icons to avoid conflicts
          rm -f AppDir/*.desktop AppDir/AppRun AppDir/.DirIcon AppDir/*.png AppDir/*.svg

          echo "=== AppDir root after cleanup ==="
          ls -la AppDir/

      # -----------------------------------------------------------------------
      # 6. Install Python dependencies directly into the bundle's site-packages
      # -----------------------------------------------------------------------
      - name: Install Python dependencies into AppDir
        run: |
          PYTHON="${PWD}/AppDir/usr/bin/python3.11"
          "${PYTHON}" -m pip install --upgrade pip --quiet
          "${PYTHON}" -m pip install \
            "PyQt6>=6.4.0" \
            "yt-dlp>=2024.1.1"
          echo "=== Installed packages ==="
          "${PYTHON}" -m pip list

      # -----------------------------------------------------------------------
      # 7. Bundle xwinwrap
      # -----------------------------------------------------------------------
      - name: Bundle xwinwrap
        run: |
          cp xwinwrap-src/xwinwrap AppDir/usr/bin/xwinwrap
          chmod +x AppDir/usr/bin/xwinwrap
          echo "Bundled: $(file AppDir/usr/bin/xwinwrap)"

      # -----------------------------------------------------------------------
      # 8. Inject app source, icons, desktop file, launcher wrapper
      # -----------------------------------------------------------------------
      - name: Inject application into AppDir
        run: |
          # Application source
          mkdir -p AppDir/usr/src
          cp wallpaper_manager.py AppDir/usr/src/

          # Icons at all hicolor sizes + root-level icon
          for SIZE in 16x16 32x32 48x48 64x64 128x128 256x256; do
            mkdir -p "AppDir/usr/share/icons/hicolor/${SIZE}/apps"
            cp assets/wallpaper-motor.png \
              "AppDir/usr/share/icons/hicolor/${SIZE}/apps/wallpaper-motor.png"
          done
          cp assets/wallpaper-motor.png AppDir/wallpaper-motor.png
          cp assets/wallpaper-motor.png AppDir/.DirIcon

          # Desktop file
          mkdir -p AppDir/usr/share/applications
          cp wallpaper-motor.desktop AppDir/wallpaper-motor.desktop
          cp wallpaper-motor.desktop AppDir/usr/share/applications/
          desktop-file-validate AppDir/wallpaper-motor.desktop || true

          # Create a wrapper executable script at usr/bin/wallpaper-motor
          printf '#!/bin/bash\nexec "${APPDIR}/usr/bin/python3.11" "${APPDIR}/usr/src/wallpaper_manager.py" "$@"\n' \
            > AppDir/usr/bin/wallpaper-motor
          chmod +x AppDir/usr/bin/wallpaper-motor

      # -----------------------------------------------------------------------
      # 9. Install AppRun entrypoint
      # -----------------------------------------------------------------------
      - name: Install AppRun
        run: |
          cp AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          echo "=== Final AppDir root ==="
          ls -la AppDir/

      # -----------------------------------------------------------------------
      # 10. Smoke test
      # -----------------------------------------------------------------------
      - name: Smoke test bundled environment
        run: |
          PYTHON="${PWD}/AppDir/usr/bin/python3.11"
          "${PYTHON}" --version
          "${PYTHON}" -c "from PyQt6.QtCore import PYQT_VERSION_STR; print('PyQt6', PYQT_VERSION_STR)"
          "${PYTHON}" -c "import yt_dlp; print('yt-dlp OK')"
          "${PYTHON}" -m py_compile AppDir/usr/src/wallpaper_manager.py && echo "Syntax OK"
          file AppDir/usr/bin/xwinwrap

      # -----------------------------------------------------------------------
      # 11. Package AppImage using mksquashfs + type2 runtime concatenation
      # -----------------------------------------------------------------------
      - name: Download AppImage runtime
        run: |
          wget -q \
            "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64" \
            -O runtime-x86_64
          echo "Runtime size: $(wc -c < runtime-x86_64) bytes"

      - name: Package AppImage
        run: |
          # Build squashfs
          mksquashfs AppDir wallpaper-motor.squashfs \
            -noappend \
            -comp xz \
            -no-progress

          echo "squashfs size: $(ls -lh wallpaper-motor.squashfs)"

          cat runtime-x86_64 wallpaper-motor.squashfs > Wallpaper-Motor-x86_64.AppImage
          chmod +x Wallpaper-Motor-x86_64.AppImage

          echo "=== Final AppImage ==="
          ls -lh Wallpaper-Motor-x86_64.AppImage

      # -----------------------------------------------------------------------
      # 12. Upload artifact (using v7 to avoid deprecated Node.js versions)
      # -----------------------------------------------------------------------
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: Wallpaper-Motor-x86_64-AppImage
          path: Wallpaper-Motor-x86_64.AppImage
          retention-days: 30

      # -----------------------------------------------------------------------
      # 13. Attach to GitHub Release (using v3 to avoid deprecated Node.js versions)
      # -----------------------------------------------------------------------
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: Wallpaper-Motor-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
