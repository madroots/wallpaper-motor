name: Build AppImage

on:
  push:
    branches:
      - master
  release:
    types: [created]

jobs:
  build:
    name: Build Wallpaper Motor AppImage
    runs-on: ubuntu-22.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install system build dependencies
      # -----------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            wget \
            fuse \
            libfuse2 \
            patchelf \
            desktop-file-utils \
            libglib2.0-dev \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinput0 \
            libxkbcommon-x11-0 \
            libegl1 \
            libgl1-mesa-dev \
            libdbus-1-3 \
            libglib2.0-0

      # -----------------------------------------------------------------------
      # 3. Download a prebuilt Python 3.11 AppImage as our bundled Python base
      #    (python-appimage project provides self-contained Python AppImages that
      #    already have the correct GLIBC and ssl libs for wide distro compat)
      # -----------------------------------------------------------------------
      - name: Download Python 3.11 AppImage base
        run: |
          wget -q "https://github.com/niess/python-appimage/releases/download/python3.11/python3.11.9-cp311-cp311-manylinux2014_x86_64.AppImage" \
            -O python3-base.AppImage
          chmod +x python3-base.AppImage

      # -----------------------------------------------------------------------
      # 4. Extract the Python AppImage to get our portable AppDir structure
      # -----------------------------------------------------------------------
      - name: Extract Python AppImage into AppDir
        run: |
          ./python3-base.AppImage --appimage-extract
          mv squashfs-root AppDir
          echo "Python AppDir extracted successfully."
          ls AppDir/usr/bin/python3*

      # -----------------------------------------------------------------------
      # 5. Install Python dependencies (PyQt6 + yt-dlp) into the AppDir
      # -----------------------------------------------------------------------
      - name: Install Python dependencies into AppDir
        run: |
          # Use the bundled python to install into the bundled site-packages
          PYTHON="${PWD}/AppDir/usr/bin/python3.11"
          
          # Upgrade pip inside the AppDir environment
          "${PYTHON}" -m pip install --upgrade pip --quiet
          
          # Install requirements into the AppDir's site-packages
          "${PYTHON}" -m pip install \
            --prefix="${PWD}/AppDir/usr" \
            --no-warn-script-location \
            PyQt6>=6.4.0 \
            yt-dlp>=2024.1.1
          
          echo "Installed packages:"
          "${PYTHON}" -m pip list

      # -----------------------------------------------------------------------
      # 6. Copy application source code and assets into the AppDir
      # -----------------------------------------------------------------------
      - name: Inject application into AppDir
        run: |
          # Application source
          mkdir -p AppDir/usr/src
          cp wallpaper_manager.py AppDir/usr/src/
          
          # Icon — place in all standard hicolor sizes for maximum compat
          for SIZE in 16x16 32x32 48x48 64x64 128x128 256x256; do
            mkdir -p "AppDir/usr/share/icons/hicolor/${SIZE}/apps"
            cp assets/wallpaper-motor.png "AppDir/usr/share/icons/hicolor/${SIZE}/apps/wallpaper-motor.png"
          done
          
          # Also place at AppDir root (required by AppImage spec for the tray icon)
          cp assets/wallpaper-motor.png AppDir/wallpaper-motor.png
          
          # Desktop file
          mkdir -p AppDir/usr/share/applications
          cp wallpaper-motor.desktop AppDir/usr/share/applications/
          cp wallpaper-motor.desktop AppDir/  # AppImage spec also wants it at root

      # -----------------------------------------------------------------------
      # 7. Install the custom AppRun entrypoint
      # -----------------------------------------------------------------------
      - name: Install AppRun entrypoint
        run: |
          cp AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

      # -----------------------------------------------------------------------
      # 8. Verify the environment: ensure PyQt6 and yt-dlp are importable
      # -----------------------------------------------------------------------
      - name: Smoke test bundled Python environment
        run: |
          PYTHON="${PWD}/AppDir/usr/bin/python3.11"
          echo "=== Python version ==="
          "${PYTHON}" --version
          echo "=== Checking PyQt6 ==="
          "${PYTHON}" -c "import PyQt6; from PyQt6.QtWidgets import QApplication; print('PyQt6 OK')"
          echo "=== Checking yt-dlp ==="
          "${PYTHON}" -c "import yt_dlp; print('yt-dlp OK')"
          echo "=== Checking app can be parsed ==="
          "${PYTHON}" -m py_compile AppDir/usr/src/wallpaper_manager.py && echo "wallpaper_manager.py syntax OK"

      # -----------------------------------------------------------------------
      # 9. Download appimagetool and package the AppDir into a final AppImage
      # -----------------------------------------------------------------------
      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

      - name: Build final AppImage
        env:
          ARCH: x86_64
        run: |
          # FUSE may not be available in GitHub Actions runner, use --appimage-extract-and-run
          ./appimagetool --appimage-extract-and-run AppDir Wallpaper-Motor-x86_64.AppImage
          echo "AppImage built:"
          ls -lh Wallpaper-Motor-x86_64.AppImage

      # -----------------------------------------------------------------------
      # 10. Upload artifact (available for all push builds)
      # -----------------------------------------------------------------------
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wallpaper-Motor-x86_64-AppImage
          path: Wallpaper-Motor-x86_64.AppImage
          retention-days: 30

      # -----------------------------------------------------------------------
      # 11. Attach to GitHub Release (only runs on release events)
      # -----------------------------------------------------------------------
      - name: Attach AppImage to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Wallpaper-Motor-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
